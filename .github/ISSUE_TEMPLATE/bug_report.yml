name: Bug report
description: Report something that doesn't work (driver not loading, wrong driver chosen, install failure, TUI glitch).
title: "[Bug]: "
labels: ["type:bug", "status:to-do"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more detail you give about your **GPU** and **distro**, the faster this gets fixed — driver selection is GPU-architecture-specific.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm running the latest version from the `main` branch.
          required: false
  - type: dropdown
    id: distro
    attributes:
      label: Distribution
      options:
        - Fedora
        - RHEL / Rocky / Alma / CentOS
        - Ubuntu
        - Other Debian-based (Mint, Pop!_OS, …)
        - Other
    validations:
      required: true
  - type: input
    id: distro_version
    attributes:
      label: Distribution version
      description: e.g. Fedora 44, Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: gpu
    attributes:
      label: GPU (paste `lspci -nn | grep -i nvidia`)
      description: This shows the chip codename + PCI ID the installer keys off (e.g. `GP107GL [Quadro P1000] [10de:1cbb]`).
      render: shell
    validations:
      required: true
  - type: dropdown
    id: stream
    attributes:
      label: Which driver stream did the installer choose (if it got that far)?
      options:
        - "current (akmod-nvidia)"
        - "580xx legacy (Maxwell/Pascal/Volta)"
        - "470xx legacy (Kepler)"
        - "It failed before choosing / I don't know"
    validations:
      required: false
  - type: dropdown
    id: secureboot
    attributes:
      label: Secure Boot
      options: ["Disabled", "Enabled", "Not sure"]
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include the exact error and any relevant `journalctl -b` / `nvidia-smi` output.
      render: shell
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Ran `sudo ./nvidia-installer.sh`
        2. …
    validations:
      required: false
